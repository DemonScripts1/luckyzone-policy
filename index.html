<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lucky Zone Policies</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e3a8a);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        overflow: hidden;
    }

    .container {
        text-align: center;
        background: rgba(255,255,255,0.08);
        padding: 50px 40px;
        border-radius: 18px;
        backdrop-filter: blur(10px);
        box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        animation: fadeIn 1s ease-in-out;
    }

    h1 {
        font-size: 34px;
        margin-bottom: 10px;
        animation: slideDown 1s ease;
    }

    p {
        color: #cbd5e1;
        margin-bottom: 25px;
        font-size: 14px;
    }

    a {
        display: block;
        text-decoration: none;
        padding: 14px;
        margin: 12px 0;
        border-radius: 10px;
        font-weight: bold;
        background: linear-gradient(90deg, #3b82f6, #2563eb);
        color: white;
        transition: 0.3s;
        transform: scale(1);
    }

    a:hover {
        transform: scale(1.05);
        background: linear-gradient(90deg, #2563eb, #1d4ed8);
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideDown {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>

<body>
    <div class="container">
        <h1>Lucky Zone</h1>
        <p>Official Privacy & Legal Policies</p>

        <a href="privacy.html">Privacy Policy</a>
        <a href="terms.html">Terms of Service</a>
    </div>
</body>
</html>
